services:
  - type: worker
    name: design-lab-telegram-bot
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    autoDeploy: true
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: OWNER_TELEGRAM_ID
        sync: false
      - key: DATABASE_PATH
        value: /var/data/design_lab_bot.db
      - key: LOG_LEVEL
        value: INFO

disks:
  - name: bot-data
    mountPath: /var/data
    sizeGB: 1
